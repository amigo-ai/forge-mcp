  <text x="989.5" y="60" text-anchor="middle" fill="#575452" font-family="'Diatype Mono', 'SF Mono', 'Fira Code', monospace" font-size="13" font-weight="500" letter-spacing="2">TEST AND PROMOTE</text>
  <rect x="879.5" y="76" width="220" height="60" rx="8" fill="white" fill-opacity="0.9" stroke="#D7D2D0" stroke-opacity="0.5" stroke-width="0.75"/>
  <text x="989.5" y="100" text-anchor="middle" fill="#100F0F" font-family="'Flecha S', Georgia, serif" font-size="16" font-weight="400">Simulation Testing</text>
  <text x="989.5" y="120" text-anchor="middle" fill="#575452" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="12">Validate changes in sim</text>
  <rect x="879.5" y="150" width="220" height="60" rx="8" fill="white" fill-opacity="0.8" stroke="#D7D2D0" stroke-opacity="0.5" stroke-width="0.75"/>
  <text x="989.5" y="174" text-anchor="middle" fill="#100F0F" font-family="'Flecha S', Georgia, serif" font-size="16" font-weight="400">A/B Comparison</text>

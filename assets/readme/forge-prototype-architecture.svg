  <text x="989.5" y="248" text-anchor="middle" fill="#100F0F" font-family="'Flecha S', Georgia, serif" font-size="16" font-weight="400">Staged Rollout</text>
  <text x="989.5" y="268" text-anchor="middle" fill="#575452" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="12">Staging then production</text>


  <!-- Connections -->
  <line x1="397" y1="173" x2="412" y2="173" stroke="#575452" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="787" y1="173" x2="802" y2="173" stroke="#575452" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrow)"/>

